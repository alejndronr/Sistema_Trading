# ══════════════════════════════════════════════════════════════════════════════
# Docker Compose — PostgreSQL para Sistema de Trading
# Optimizado para ZimaBlade (CPU-only, ~8GB RAM, HDD mecánico)
#
# Uso rápido en Proxmox:
#   docker compose up -d
#
# Inicializar schema (primera vez):
#   docker compose exec postgres psql -U trading -d trading_db -f /schema/schema.sql
#
# Conexión desde el bot:
#   DATABASE_URL=postgresql://trading:trading_secure_pass@localhost:5432/trading_db
# ══════════════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine          # Alpine = imagen mínima, menor footprint
    container_name: trading_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_secure_pass   # ⚠️ Cambiar en producción
      POSTGRES_DB: trading_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: UTC

    ports:
      - "5432:5432"                    # Solo exponer en red local / VPN

    volumes:
      # Datos persistentes en HDD del ZimaBlade
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización (se ejecuta automáticamente en primer boot)
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

    # ── Límites de recursos (ZimaBlade con 8GB RAM) ───────────────────────────
    deploy:
      resources:
        limits:
          memory: 2G                   # Máximo 2GB RAM para PG
          cpus: "1.5"                  # Máximo 1.5 cores (dejar CPU para el bot)
        reservations:
          memory: 512M
          cpus: "0.5"

    # ── Tuning de PostgreSQL optimizado para HDD mecánico ─────────────────────
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=4.0
        -c effective_io_concurrency=2
        -c synchronous_commit=off
        -c wal_level=minimal
        -c max_wal_senders=0
        -c log_min_duration_statement=1000
        -c max_connections=50

    # ── Health check ─────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ── Redes ─────────────────────────────────────────────────────────────────────
networks:
  default:
    name: trading_network

# ── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
